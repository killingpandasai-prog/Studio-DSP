<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Mic Clean</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; padding: 50px; }
        button { background: #007bff; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 10px; cursor: pointer; margin: 10px; }
        button:disabled { background: #444; }
        #status { margin-top: 20px; color: #aaa; }
    </style>
</head>
<body>
    <h1>Studio Voice Filter</h1>
    <button id="startBtn">Start Microphone</button>
    <button id="filterBtn" disabled>Turn On Filter</button>
    <p id="status">బటన్ నొక్కి మైక్రోఫోన్ ఆన్ చేయండి.</p>

    <script src="app.js"></script>
</body>
</html>
